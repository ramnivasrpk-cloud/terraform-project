apiVersion: apps/v1
kind: Deployment
metadata:
  name: terraform-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: terraform-app
  template:
    metadata:
      labels:
        app: terraform-app
    spec:
      containers:
      - name: app
        image: ramnivas18/terraform-app
        ports:
        - containerPort: 5000
